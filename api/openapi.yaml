# SPDX-License-Identifier: AGPL-3.0-only

openapi: 3.0.3
info:
  title: OpenBox API
  version: v1
  description: Versioned, owner-scoped API for the OpenBox instance engine.
servers:
  - url: http://127.0.0.1:8443
    description: Loopback-only default for local v0.1 deployments.
  - url: https://127.0.0.1:8443
    description: Optional TLS listener when an operator supplies a certificate and key.
security:
  - cookieAuth: []
  - bearerAuth: []
paths:
  /v1/health:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
        default: { $ref: "#/components/responses/Error" }
  /v1/bootstrap:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      security: []
      operationId: getBootstrapStatus
      responses:
        "200":
          description: Whether one-time owner setup is available.
          content: { application/json: { schema: { $ref: "#/components/schemas/BootstrapStatus" } } }
        default: { $ref: "#/components/responses/Error" }
    post:
      security: []
      operationId: consumeBootstrap
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BootstrapRequest" } } }
      responses:
        "201":
          description: Owner credential and browser session created atomically.
          content: { application/json: { schema: { $ref: "#/components/schemas/Session" } } }
        default: { $ref: "#/components/responses/Error" }
  /v1/sessions:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    post:
      security: []
      operationId: createSession
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/LoginRequest" } } }
      responses:
        "201":
          description: New browser session with a rotated, server-generated identifier.
          content: { application/json: { schema: { $ref: "#/components/schemas/Session" } } }
        "429": { $ref: "#/components/responses/Error" }
        default: { $ref: "#/components/responses/Error" }
  /v1/session:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      security: [{ cookieAuth: [] }]
      operationId: getSession
      responses:
        "200": { description: Current owner session with rotated cookie and CSRF token for reload continuity., content: { application/json: { schema: { $ref: "#/components/schemas/Session" } } } }
        default: { $ref: "#/components/responses/Error" }
    delete:
      security: [{ cookieAuth: [] }]
      operationId: deleteSession
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: Session revoked. }
        default: { $ref: "#/components/responses/Error" }
  /v1/users:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listUsers
      responses:
        "200": { description: Users with a membership in the current organization., content: { application/json: { schema: { $ref: "#/components/schemas/ListUsersResponse" } } } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createUser
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateUserRequest" } } }
      responses:
        "201": { description: Member user created in the current organization., content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        default: { $ref: "#/components/responses/Error" }
  /v1/tokens:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listTokens
      responses:
        "200": { description: Token metadata without secrets or hashes., content: { application/json: { schema: { $ref: "#/components/schemas/ListTokensResponse" } } } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createToken
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateTokenRequest" } } }
      responses:
        "201": { description: Token secret, returned once., content: { application/json: { schema: { $ref: "#/components/schemas/CreatedToken" } } } }
        default: { $ref: "#/components/responses/Error" }
  /v1/tokens/{token_id}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { name: token_id, in: path, required: true, schema: { type: string } }
    delete:
      operationId: revokeToken
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: Token revoked immediately. }
        default: { $ref: "#/components/responses/Error" }
  /v1/ssh-keys:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listSSHKeys
      responses:
        "200": { description: Authorized SSH keys., content: { application/json: { schema: { $ref: "#/components/schemas/ListSSHKeysResponse" } } } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createSSHKey
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateSSHKeyRequest" } } }
      responses:
        "201": { description: Normalized SSH key., content: { application/json: { schema: { $ref: "#/components/schemas/SSHKey" } } } }
        default: { $ref: "#/components/responses/Error" }
  /v1/ssh-keys/{key_id}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { name: key_id, in: path, required: true, schema: { type: string } }
    patch:
      operationId: updateSSHKey
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateSSHKeyRequest" } } }
      responses:
        "200": { description: SSH key label updated without changing key material., content: { application/json: { schema: { $ref: "#/components/schemas/SSHKey" } } } }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteSSHKey
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: SSH key deleted. }
        default: { $ref: "#/components/responses/Error" }
  /v1/capabilities:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: getCapabilities
      responses:
        "200":
          description: Runtime capabilities.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capabilities" }
        default: { $ref: "#/components/responses/Error" }
  /v1/connection:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: getConnection
      summary: Client connection endpoints for the authenticated owner
      responses:
        "200":
          description: Connection advertisement for console/CLI clients.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Connection" }
        default: { $ref: "#/components/responses/Error" }
  /v1/images:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listImages
      responses:
        "200":
          description: Available images.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListImagesResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/images/build:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/IdempotencyKey" }
    post:
      operationId: buildImage
      summary: Build the embedded Devbox image recipe
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BuildImageRequest" }
      responses:
        "202":
          description: Image build accepted.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default: { $ref: "#/components/responses/Error" }
  /v1/software:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listSoftwareCatalog
      summary: List curated installable software packages
      responses:
        "200":
          description: Curated software catalog.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListSoftwareResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listInstances
      responses:
        "200":
          description: Instances owned by the configured owner.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListInstancesResponse" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createInstance
      parameters:
        - { $ref: "#/components/parameters/IdempotencyKey" }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstanceRequest" }
      responses:
        "202":
          description: Creation was accepted as a durable operation.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateInstanceResult" }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
    get:
      operationId: getInstance
      responses:
        "200":
          description: Instance details.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Instance" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteInstance
      parameters:
        - { $ref: "#/components/parameters/IdempotencyKey" }
        - { $ref: "#/components/parameters/CSRFToken" }
      responses:
        "202":
          description: Deletion was accepted as a durable operation.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/software/{package_id}/install:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
      - name: package_id
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: installInstanceSoftware
      parameters:
        - { $ref: "#/components/parameters/CSRFToken" }
      summary: Install a catalog package into a running instance
      responses:
        "200":
          description: Software install result for the instance.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstanceSoftware" }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/suggested-ports:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
    get:
      operationId: listSuggestedPorts
      summary: Suggest candidate ports without creating routes
      description: >
        Returns detected or known candidate ports for an instance. Suggestions never
        create or publish routes. When the runtime cannot list listening ports yet,
        the items list is empty.
      responses:
        "200":
          description: Suggested ports (may be empty).
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuggestedPortsResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/actions/{action}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
      - name: action
        in: path
        required: true
        schema:
          type: string
          enum: [start, stop, restart]
      - { $ref: "#/components/parameters/IdempotencyKey" }
      - { $ref: "#/components/parameters/CSRFToken" }
    post:
      operationId: mutateInstance
      responses:
        "202":
          description: Action was accepted as a durable operation.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default: { $ref: "#/components/responses/Error" }
  /v1/pi-profiles:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listPiProfiles
      responses:
        "200":
          description: Owner-scoped shared Pi profiles.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PiProfile" }
        default: { $ref: "#/components/responses/Error" }
  /v1/pi-profiles/{profile_id}/versions:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - name: profile_id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: listPiProfileVersions
      responses:
        "200":
          description: Immutable Pi profile version history.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PiProfileVersion" }
        default: { $ref: "#/components/responses/Error" }
  /v1/pi-profiles/{profile_id}/rollback:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - name: profile_id
        in: path
        required: true
        schema: { type: string }
      - { $ref: "#/components/parameters/CSRFToken" }
    post:
      operationId: rollbackPiProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Profile rolled back by creating a new version.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PiProfile" }
        default: { $ref: "#/components/responses/Error" }
  /v1/pi-profiles/{profile_id}/apply:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - name: profile_id
        in: path
        required: true
        schema: { type: string }
      - { $ref: "#/components/parameters/CSRFToken" }
    post:
      operationId: applyPiProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instance_ids]
              properties:
                instance_ids:
                  type: array
                  items: { type: string }
                  minItems: 1
      responses:
        "200":
          description: Profile settings materialized into selected instances.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/exec:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
      - { $ref: "#/components/parameters/CSRFToken" }
    post:
      operationId: execInstance
      summary: Execute an argv command and stream framed output
      description: |
        Runs an argv command inside a running instance and returns
        application/x-ndjson frames. Output is never stored in SQLite.

        Frame types:
        - `{"type":"stdout","data":"<base64>"}` — stdout chunk
        - `{"type":"stderr","data":"<base64>"}` — stderr chunk
        - `{"type":"exit","code":0}` — process finished
        - `{"type":"error","code":"...","message":"..."}` — policy/transport failure

        Common `error.code` values: `timeout`, `operation_canceled`, `unavailable`,
        `busy` (max 2 concurrent execs per instance), `rate_limited` (1 MiB/s framed
        output budget). Precondition failures may also return HTTP errors with
        `invalid_transition`, `busy`, or `rate_limited` before a stream starts.

        Current limitation: frames are emitted after the runtime command returns
        (buffered), not as a live guest stream.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExecInstanceRequest" }
      responses:
        "200":
          description: Framed execution stream.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/x-ndjson:
              schema:
                type: string
                description: Newline-delimited JSON execstream frames (stdout, stderr, exit, error).
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/extend:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
      - { $ref: "#/components/parameters/CSRFToken" }
    post:
      operationId: extendInstanceExpiry
      summary: Extend a Sandbox TTL
      description: |
        Lengthens `expires_at` by `duration_seconds`. Rejected once deletion has
        begun, or if the result would exceed created_at + 24h. Non-sandbox
        instances return `invalid_argument`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtendInstanceRequest" }
      responses:
        "200":
          description: Updated instance with new expires_at.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Instance" }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/snapshots:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
    get:
      operationId: listInstanceSnapshots
      summary: List disk-only checkpoints for an instance
      responses:
        "200":
          description: Snapshots owned by the caller for this instance.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListSnapshotsResponse" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createInstanceSnapshot
      summary: Create a disk-only checkpoint
      description: |
        Creates an immutable disk-only Incus snapshot (`stateful: false`). Returns a
        durable `snapshot.create` operation. Suspended-memory checkpoints are not supported.
      parameters:
        - { $ref: "#/components/parameters/IdempotencyKey" }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSnapshotRequest" }
      responses:
        "202":
          description: Snapshot create accepted as a durable operation.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateSnapshotResult" }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/artifacts:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
    get:
      operationId: listInstanceArtifacts
      summary: List instance artifacts
      parameters:
        - name: prefix
          in: query
          required: false
          schema: { type: string, maxLength: 256 }
      responses:
        "200":
          description: Artifacts owned by the caller for this instance, sorted by path.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListArtifactsResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/artifacts/{path}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
      - { $ref: "#/components/parameters/ArtifactPath" }
    get:
      operationId: getInstanceArtifact
      summary: Inspect an artifact
      responses:
        "200":
          description: Artifact metadata.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Artifact" }
        default: { $ref: "#/components/responses/Error" }
    put:
      operationId: putInstanceArtifact
      summary: Upload or replace an artifact
      parameters:
        - { $ref: "#/components/parameters/ArtifactIdempotencyKey" }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "200":
          description: Existing artifact replaced.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Artifact" }
        "201":
          description: Artifact stored.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Artifact" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteInstanceArtifact
      summary: Delete an artifact
      parameters:
        - { $ref: "#/components/parameters/CSRFToken" }
      responses:
        "204":
          description: Artifact deleted.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/artifacts/{path}/content:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
      - { $ref: "#/components/parameters/ArtifactPath" }
    get:
      operationId: downloadInstanceArtifact
      summary: Download an artifact
      responses:
        "200":
          description: Artifact bytes.
          headers:
            X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" }
            ETag: { schema: { type: string } }
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "304":
          description: Artifact is unchanged.
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/clone:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
      - { $ref: "#/components/parameters/IdempotencyKey" }
      - { $ref: "#/components/parameters/CSRFToken" }
    post:
      operationId: cloneInstance
      summary: Clone a live instance
      description: |
        Creates a new independent instance from the live source only. Point-in-time
        fan-out uses checkpoint + restore. Rewrites ownership metadata and
        OpenBox-managed SSH access. May return warnings for full-copy storage or
        retained guest secrets. Copy-on-write is claimed only when
        `storage_efficiency` is `confirmed`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CloneInstanceRequest" }
      responses:
        "202":
          description: Clone accepted as a durable operation.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeriveInstanceResult" }
        default: { $ref: "#/components/responses/Error" }
  /v1/snapshots/{snapshot_id}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/SnapshotID" }
    get:
      operationId: getSnapshot
      summary: Inspect a checkpoint
      responses:
        "200":
          description: Snapshot details.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Snapshot" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteSnapshot
      summary: Delete a checkpoint
      parameters:
        - { $ref: "#/components/parameters/IdempotencyKey" }
        - { $ref: "#/components/parameters/CSRFToken" }
      responses:
        "202":
          description: Snapshot delete accepted as a durable operation.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default: { $ref: "#/components/responses/Error" }
  /v1/snapshots/{snapshot_id}/restore:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/SnapshotID" }
      - { $ref: "#/components/parameters/IdempotencyKey" }
      - { $ref: "#/components/parameters/CSRFToken" }
    post:
      operationId: restoreSnapshotAsNew
      summary: Restore a checkpoint as a new instance
      description: |
        Creates a new independent instance from a named disk-only checkpoint.
        Rewrites ownership metadata and OpenBox-managed SSH access. Derived
        instances use destination egress defaults (not source policy).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RestoreSnapshotRequest" }
      responses:
        "202":
          description: Restore accepted as a durable operation.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeriveInstanceResult" }
        default: { $ref: "#/components/responses/Error" }
  /v1/audit-events:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - name: limit
        in: query
        required: false
        schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
        description: Maximum number of newest audit events to return.
    get:
      operationId: listAuditEvents
      responses:
        "200":
          description: Owner-scoped immutable audit events, newest first.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListAuditEventsResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/network/egress-profiles:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listEgressProfiles
      responses:
        "200":
          description: Host-global egress profiles.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListEgressProfilesResponse" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createEgressProfile
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateEgressProfileRequest" } } }
      responses:
        "201":
          description: Egress profile created.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EgressProfile" }
        default: { $ref: "#/components/responses/Error" }
  /v1/network/egress-profiles/{profile_id}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - name: profile_id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getEgressProfile
      responses:
        "200":
          description: Egress profile details.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EgressProfile" }
        default: { $ref: "#/components/responses/Error" }
    patch:
      operationId: updateEgressProfile
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateEgressProfileRequest" } } }
      responses:
        "200":
          description: Profile updated; apply_errors lists instances that failed re-apply.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpdateEgressProfileResponse" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteEgressProfile
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: Profile deleted. }
        default: { $ref: "#/components/responses/Error" }
  /v1/instances/{instance_id}/network/egress-profile:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/InstanceID" }
      - { $ref: "#/components/parameters/CSRFToken" }
    put:
      operationId: attachInstanceEgressProfile
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AttachEgressProfileRequest" } } }
      responses:
        "200":
          description: Instance attached to the profile with policy re-applied when running.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Instance" }
        default: { $ref: "#/components/responses/Error" }
  /v1/routes:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listRoutes
      responses:
        "200":
          description: Owner-scoped HTTPS routes.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListRoutesResponse" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createRoute
      summary: Create a private HTTPS route
      description: >
        Explicitly creates a route for a managed instance port. New routes are
        always private; publication requires POST /v1/routes/{route_id}/publish.
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateRouteRequest" } } }
      responses:
        "201":
          description: Private route created.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Route" }
        default: { $ref: "#/components/responses/Error" }
  /v1/routes/{route_id}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/RouteID" }
    get:
      operationId: getRoute
      responses:
        "200":
          description: Route details.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Route" }
        default: { $ref: "#/components/responses/Error" }
    patch:
      operationId: updateRoute
      summary: Update hostname or target port
      description: Updates hostname and/or target port without changing visibility.
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateRouteRequest" } } }
      responses:
        "200":
          description: Route updated.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Route" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteRoute
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: Route deleted. }
        default: { $ref: "#/components/responses/Error" }
  /v1/routes/{route_id}/publish:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/RouteID" }
    post:
      operationId: publishRoute
      summary: Publish a private route
      description: Explicitly flips route visibility to public. Create never publishes automatically.
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "200":
          description: Route is public.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Route" }
        default: { $ref: "#/components/responses/Error" }
  /v1/routes/{route_id}/validate-dns:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/RouteID" }
    post:
      operationId: validateRouteDNS
      summary: Validate custom-domain DNS for a route
      description: >
        Looks up the route hostname and sets tls_state to pending (no/missing
        records or no expected host IPs configured), invalid (resolves but not to
        the OpenBox host), or active (matches an expected host address).
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "200":
          description: Route with updated tls_state.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Route" }
        default: { $ref: "#/components/responses/Error" }
  /v1/certificates/allow:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - name: domain
        in: query
        required: true
        description: Hostname requested for on-demand TLS certificate issuance.
        schema: { type: string }
    get:
      operationId: allowCertificate
      summary: Allow certificate issuance for an approved hostname
      description: >
        Caddy on-demand TLS ask endpoint. Returns 200 only when domain matches an
        existing persisted route hostname (any visibility). Unknown, deleted, and
        malformed names return 404. Unauthenticated by design; bind the API privately
        so only the local gateway can call it.
      security: []
      responses:
        "200":
          description: Hostname is approved for certificate issuance.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
        "404": { $ref: "#/components/responses/Error" }
        default: { $ref: "#/components/responses/Error" }
  /v1/gateway/auth:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: gatewayAuth
      summary: Authorize access to an HTTPS route hostname
      description: >
        Caddy forward_auth endpoint. Uses the request Host (or X-Forwarded-Host)
        to select a route. Public routes return 200 without credentials. Private
        routes require an owner session cookie, owner API bearer token, or a
        route-scoped bearer token (obr_…). Unauthenticated by design at the HTTP
        middleware layer; bind the API privately.
      security: []
      responses:
        "200":
          description: Access allowed.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        default: { $ref: "#/components/responses/Error" }
  /v1/operations:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listOperations
      responses:
        "200":
          description: Durable operations.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListOperationsResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/operations/{operation_id}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/OperationID" }
    get:
      operationId: getOperation
      responses:
        "200":
          description: Operation details.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default: { $ref: "#/components/responses/Error" }
  /v1/operations/{operation_id}/cancel:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/OperationID" }
    post:
      operationId: cancelOperation
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "200":
          description: Operation cancellation was accepted at a safe stage.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Operation" }
        default: { $ref: "#/components/responses/Error" }
  /v1/operations/{operation_id}/events:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { $ref: "#/components/parameters/OperationID" }
      - name: Last-Event-ID
        in: header
        required: false
        description: Last processed operation-event sequence.
        schema: { type: integer, minimum: 0 }
    get:
      operationId: watchOperation
      responses:
        "200":
          description: SSE replay followed by live events. Closes after a terminal event.
          headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
          content:
            text/event-stream:
              schema: { type: string }
        default: { $ref: "#/components/responses/Error" }
  /v1/webhook-subscriptions:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listWebhookSubscriptions
      responses:
        "200": { description: Owner webhook subscriptions without signing secrets., content: { application/json: { schema: { $ref: "#/components/schemas/ListWebhookSubscriptionsResponse" } } } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createWebhookSubscription
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateWebhookSubscriptionRequest" } } }
      responses:
        "201": { description: Subscription and signing secret returned once., content: { application/json: { schema: { $ref: "#/components/schemas/CreatedWebhookSubscription" } } } }
        default: { $ref: "#/components/responses/Error" }
  /v1/webhook-subscriptions/{subscription_id}:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
      - { name: subscription_id, in: path, required: true, schema: { type: string, minLength: 1 } }
    get:
      operationId: getWebhookSubscription
      responses:
        "200": { description: Subscription metadata without signing secret., content: { application/json: { schema: { $ref: "#/components/schemas/WebhookSubscription" } } } }
        default: { $ref: "#/components/responses/Error" }
    patch:
      operationId: updateWebhookSubscription
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateWebhookSubscriptionRequest" } } }
      responses:
        "200": { description: Updated subscription; a rotated secret is returned once., content: { application/json: { schema: { $ref: "#/components/schemas/CreatedWebhookSubscription" } } } }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteWebhookSubscription
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: Subscription deleted and pending deliveries canceled. }
        default: { $ref: "#/components/responses/Error" }
  /v1/webhook-deliveries:
    parameters:
      - { $ref: "#/components/parameters/APIVersion" }
    get:
      operationId: listWebhookDeliveries
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [pending, delivered, failed, dead, canceled] } }
        - { name: subscription_id, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 1000, default: 100 } }
      responses:
        "200": { description: Owner webhook delivery attempts, newest first., content: { application/json: { schema: { $ref: "#/components/schemas/ListWebhookDeliveriesResponse" } } } }
        default: { $ref: "#/components/responses/Error" }
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: openbox_session
      description: HttpOnly SameSite browser session. Unsafe requests also require X-CSRF-Token.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: OpenBox token
      description: Bearer tokens are revocable and may be limited to one or more documented token scopes. The legacy owner scope is a self-hosted compatibility super-scope.
  headers:
    APIVersion:
      description: API contract version used for this response.
      schema: { type: string, enum: [v1] }
  parameters:
    APIVersion:
      name: X-OpenBox-API-Version
      in: header
      required: false
      description: Optional compatibility assertion. If present, it must be v1.
      schema: { type: string, enum: [v1] }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 255 }
    ArtifactIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 255 }
    InstanceID:
      name: instance_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    SnapshotID:
      name: snapshot_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    ArtifactPath:
      name: path
      in: path
      required: true
      description: Percent-encoded logical artifact path.
      schema: { type: string, minLength: 1, maxLength: 512 }
    OperationID:
      name: operation_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    RouteID:
      name: route_id
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    CSRFToken:
      name: X-CSRF-Token
      in: header
      required: false
      description: Required for unsafe requests authenticated by the session cookie; ignored for bearer authentication.
      schema: { type: string, minLength: 20 }
  responses:
    Error:
      description: Stable error envelope.
      headers: { X-OpenBox-API-Version: { $ref: "#/components/headers/APIVersion" } }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  schemas:
    Artifact:
      type: object
      required: [id, instance_id, path, size_bytes, content_type, sha256, created_at, updated_at]
      properties:
        id: { type: string }
        instance_id: { type: string }
        path: { type: string }
        size_bytes: { type: integer, format: int64, minimum: 0 }
        content_type: { type: string }
        sha256: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ListArtifactsResponse:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Artifact" } }
    BootstrapStatus:
      type: object
      required: [required]
      properties:
        required: { type: boolean }
    BootstrapRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username: { type: string, minLength: 1, maxLength: 100 }
        password: { type: string, minLength: 12, maxLength: 1024, writeOnly: true }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [password]
      properties:
        username: { type: string, minLength: 1, maxLength: 100 }
        password: { type: string, minLength: 1, maxLength: 1024, writeOnly: true }
    Session:
      type: object
      required: [owner_id, user_id, username, role, expires_at, csrf_token]
      properties:
        owner_id: { type: string }
        user_id: { type: string }
        username: { type: string }
        role: { type: string, enum: [admin, member] }
        expires_at: { type: string, format: date-time }
        csrf_token: { type: string, readOnly: true }
    User:
      type: object
      required: [id, username, display_name, role, created_at]
      properties:
        id: { type: string }
        username: { type: string }
        display_name: { type: string }
        role: { type: string, enum: [admin, member] }
        created_at: { type: string, format: date-time }
    CreateUserRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username: { type: string, minLength: 1, maxLength: 100 }
        display_name: { type: string, maxLength: 100 }
        password: { type: string, minLength: 12, maxLength: 1024, writeOnly: true }
    ListUsersResponse:
      type: object
      required: [items]
      properties: { items: { type: array, items: { $ref: "#/components/schemas/User" } } }
    TokenMetadata:
      type: object
      required: [id, name, scopes, created_at]
      properties:
        id: { type: string }
        name: { type: string }
        scopes:
          type: array
          items: { $ref: "#/components/schemas/TokenScope" }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
    CreatedToken:
      allOf:
        - { $ref: "#/components/schemas/TokenMetadata" }
        - type: object
          required: [secret]
          properties: { secret: { type: string, readOnly: true } }
    CreateTokenRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        scopes:
          type: array
          items: { $ref: "#/components/schemas/TokenScope" }
        expires_at: { type: string, format: date-time }
    TokenScope:
      type: string
      enum:
        - owner
        - instances:read
        - instances:write
        - operations:read
        - audit:read
        - webhooks:read
        - webhooks:write
        - routes:read
        - routes:write
        - profiles:read
        - profiles:write
        - artifacts:read
        - artifacts:write
      description: The owner scope preserves full self-hosted owner access. Instances covers instance lifecycle, images, snapshots, terminal and exec; operations is read-only; profiles covers Pi and egress profiles. Non-owner scopes are least-privilege bearer capabilities and do not grant token, SSH-key, or session management.
    ListTokensResponse:
      type: object
      required: [items]
      properties: { items: { type: array, items: { $ref: "#/components/schemas/TokenMetadata" } } }
    SSHKey:
      type: object
      required: [id, label, fingerprint, public_key, created_at]
      properties:
        id: { type: string }
        label: { type: string }
        fingerprint: { type: string }
        public_key: { type: string }
        created_at: { type: string, format: date-time }
    CreateSSHKeyRequest:
      type: object
      additionalProperties: false
      required: [label, public_key]
      properties:
        label: { type: string, minLength: 1, maxLength: 100 }
        public_key: { type: string, minLength: 1, maxLength: 16384 }
    UpdateSSHKeyRequest:
      type: object
      additionalProperties: false
      required: [label]
      properties: { label: { type: string, minLength: 1, maxLength: 100 } }
    ListSSHKeysResponse:
      type: object
      required: [items]
      properties: { items: { type: array, items: { $ref: "#/components/schemas/SSHKey" } } }
    Health:
      type: object
      required: [status, api_version, server_version]
      properties:
        status: { type: string, enum: [ok] }
        api_version: { type: string, enum: [v1] }
        server_version: { type: string }
        degraded:
          type: boolean
          description: True when a transient operation or reconciliation failure has degraded the control plane.
        kvm:
          type: boolean
          description: Whether the daemon can use KVM-backed virtual machines.
        operations:
          $ref: "#/components/schemas/HealthOperationSummary"
        pool:
          $ref: "#/components/schemas/HealthPoolSummary"
    HealthOperationSummary:
      type: object
      required: [pending, failed]
      properties:
        pending:
          type: integer
          minimum: 0
          description: Durable operations currently in the pending state.
        failed:
          type: integer
          minimum: 0
          description: Durable operations in the failed state.
    HealthPoolSummary:
      type: object
      required: [enabled, golden_ready, stopped, running, claiming, cow_storage, substrate]
      properties:
        enabled: { type: boolean }
        golden_ready: { type: boolean }
        stopped: { type: integer, minimum: 0 }
        running: { type: integer, minimum: 0 }
        claiming: { type: integer, minimum: 0 }
        cow_storage: { type: boolean }
        substrate: { type: string }
    SSHEndpoint:
      type: object
      required: [host, port]
      properties:
        host: { type: string, minLength: 1 }
        port: { type: integer, minimum: 1, maximum: 65535 }
    Connection:
      type: object
      required: [ssh]
      properties:
        ssh:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/SSHEndpoint" }
    Capabilities:
      type: object
      required: [architecture, incus_version, namespaces, cgroups, storage_drivers, network_tools, kvm, containers, virtual_machines, vm_availability]
      properties:
        architecture: { type: string }
        incus_version: { type: string }
        namespaces: { type: object, additionalProperties: { type: boolean } }
        cgroups: { type: boolean }
        storage_drivers: { type: array, items: { type: string } }
        network_tools: { type: object, additionalProperties: { type: boolean } }
        kvm: { type: boolean }
        containers: { type: boolean }
        virtual_machines: { type: boolean }
        vm_availability: { type: string }
        vm_reason: { type: string }
    Resources:
      type: object
      required: [vcpus, memory_bytes, disk_bytes]
      properties:
        vcpus: { type: integer, minimum: 0 }
        memory_bytes: { type: integer, format: int64, minimum: 0 }
        disk_bytes: { type: integer, format: int64, minimum: 0 }
    Image:
      type: object
      required: [id, alias, source, digest, architecture, compatibility, created_at, updated_at]
      properties:
        id: { type: string }
        alias: { type: string }
        source: { type: string }
        digest: { type: string }
        architecture: { type: string }
        compatibility: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AllowlistResolution:
      type: object
      required: [state, pending, resolved, failed]
      description: Hostname resolution state. Resolved DNS addresses are not exposed.
      properties:
        state: { type: string, enum: [idle, pending, resolved, failed] }
        pending: { type: array, items: { type: string } }
        resolved: { type: array, items: { type: string } }
        failed: { type: array, items: { type: string } }
    NetworkPolicyStatus:
      type: object
      required: [egress_mode, acls, resolution, denied_flows]
      description: Effective host-enforced network policy metadata without packet or DNS-answer payloads.
      properties:
        egress_mode: { type: string, enum: [standard, restricted] }
        acls: { type: array, items: { type: string } }
        resolution: { $ref: "#/components/schemas/AllowlistResolution" }
        denied_flows: { type: integer, format: int64, minimum: 0 }
    EgressProfile:
      type: object
      required: [id, name, mode, allowed_destinations, dns_policy, system, created_at, updated_at]
      properties:
        id: { type: string }
        name: { type: string }
        mode: { type: string, enum: [standard, restricted] }
        allowed_destinations:
          type: array
          items: { type: string }
        dns_policy:
          type: string
          enum: [host_resolve]
          description: Host-side allowlist hostname resolution policy.
        system: { type: boolean }
        attached_instance_count: { type: integer, minimum: 0 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AuditEvent:
      type: object
      required: [id, actor, action, target_type, target_id, outcome, metadata, created_at]
      description: Immutable security audit record without payloads or secrets.
      properties:
        id: { type: string }
        actor: { type: string }
        action:
          type: string
          description: >
            Stable action vocabulary includes policy.apply, policy.apply_failed,
            policy.refresh, policy.refresh_failed, ssh.session, and terminal.session.
        target_type: { type: string }
        target_id: { type: string }
        outcome: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }
        created_at: { type: string, format: date-time }
    ListAuditEventsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AuditEvent" }
    WebhookSubscription:
      type: object
      required: [id, url, description, events, enabled, created_at, updated_at]
      properties:
        id: { type: string }
        url: { type: string, format: uri, maxLength: 2048 }
        description: { type: string, maxLength: 200 }
        events:
          type: array
          minItems: 1
          items: { type: string, enum: [operation.terminal, instance.expired, instance.deleted] }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreatedWebhookSubscription:
      allOf:
        - { $ref: "#/components/schemas/WebhookSubscription" }
        - type: object
          required: [secret]
          properties:
            secret: { type: string, readOnly: true }
    CreateWebhookSubscriptionRequest:
      type: object
      additionalProperties: false
      required: [url, events]
      properties:
        url: { type: string, format: uri, maxLength: 2048 }
        description: { type: string, maxLength: 200 }
        events:
          type: array
          minItems: 1
          items: { type: string, enum: [operation.terminal, instance.expired, instance.deleted] }
        enabled: { type: boolean, default: true }
    UpdateWebhookSubscriptionRequest:
      type: object
      additionalProperties: false
      properties:
        url: { type: string, format: uri, maxLength: 2048 }
        description: { type: string, maxLength: 200 }
        events:
          type: array
          minItems: 1
          items: { type: string, enum: [operation.terminal, instance.expired, instance.deleted] }
        enabled: { type: boolean }
        rotate_secret: { type: boolean }
    ListWebhookSubscriptionsResponse:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/WebhookSubscription" } }
    WebhookDelivery:
      type: object
      required: [id, event_id, subscription_id, status, attempt, created_at, updated_at]
      properties:
        id: { type: string }
        event_id: { type: string }
        subscription_id: { type: string }
        status: { type: string, enum: [pending, delivered, failed, dead, canceled] }
        attempt: { type: integer, minimum: 1 }
        http_status: { type: integer }
        error_class: { type: string, enum: [timeout, connection, http_error] }
        next_attempt_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ListWebhookDeliveriesResponse:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/WebhookDelivery" } }
    ListEgressProfilesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/EgressProfile" }
    CreateEgressProfileRequest:
      type: object
      required: [name, mode]
      additionalProperties: false
      properties:
        name: { type: string }
        mode: { type: string, enum: [standard, restricted] }
        allowed_destinations:
          type: array
          items: { type: string }
    UpdateEgressProfileRequest:
      type: object
      additionalProperties: false
      properties:
        name: { type: string }
        mode: { type: string, enum: [standard, restricted] }
        allowed_destinations:
          type: array
          items: { type: string }
    EgressApplyError:
      type: object
      required: [instance_id, message]
      properties:
        instance_id: { type: string }
        message: { type: string }
    UpdateEgressProfileResponse:
      type: object
      required: [profile]
      properties:
        profile: { $ref: "#/components/schemas/EgressProfile" }
        apply_errors:
          type: array
          items: { $ref: "#/components/schemas/EgressApplyError" }
    AttachEgressProfileRequest:
      type: object
      required: [egress_profile_id]
      additionalProperties: false
      properties:
        egress_profile_id: { type: string }
    Instance:
      type: object
      required: [id, name, kind, image_id, requested_isolation, actual_isolation, desired_state, observed_state, resources, protected, network_policy, created_at, updated_at]
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string, enum: [sandbox, vps] }
        image_id:
          type: string
          description: Immutable image fingerprint pinned at create time.
        requested_isolation:
          type: string
          enum: [strong, container]
          description: >
            Resolved isolation request after create acceptance. An omitted create
            request is filled with strong when KVM is usable, otherwise container.
        actual_isolation:
          type: string
          enum: [unknown, container, virtual_machine]
          description: Runtime type that was provisioned. Never silently differs from a successful strong request.
        desired_state: { type: string, enum: [running, stopped, deleted] }
        observed_state: { type: string, enum: [pending, creating, running, stopping, stopped, deleting, deleted, error] }
        resources: { $ref: "#/components/schemas/Resources" }
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Required for sandboxes. Absolute UTC expiry; max created_at + 24h.
        protected: { type: boolean }
        software:
          type: array
          items: { $ref: "#/components/schemas/InstanceSoftware" }
        error_code: { type: string, description: Machine-readable failure code when observed_state is error. }
        error_stage: { type: string, description: Stage or phase where cleanup/runtime failure was recorded. }
        error_retryable: { type: boolean }
        egress_profile_id: { type: string }
        clone_source_instance_id:
          type: string
          description: Source instance id when this instance was cloned or restored.
        clone_source_snapshot_id:
          type: string
          description: Checkpoint id for restore-as-new; empty for live clone.
        clone_source_image_id:
          type: string
          description: Immutable image fingerprint inherited from the source.
        network_policy: { $ref: "#/components/schemas/NetworkPolicyStatus" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Snapshot:
      type: object
      required: [id, instance_id, name, ready, created_at]
      properties:
        id: { type: string }
        instance_id: { type: string }
        name: { type: string }
        ready:
          type: boolean
          description: True only after the disk-only runtime snapshot is available for restore or delete.
        created_at: { type: string, format: date-time }
    ListSnapshotsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Snapshot" }
    CreateSnapshotRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, description: Checkpoint name; same validation as instance names. }
    CreateSnapshotResult:
      type: object
      required: [operation]
      properties:
        snapshot:
          allOf: [{ $ref: "#/components/schemas/Snapshot" }]
          nullable: true
        operation: { $ref: "#/components/schemas/Operation" }
    CloneInstanceRequest:
      type: object
      required: [name, owner_public_key]
      additionalProperties: false
      properties:
        name: { type: string }
        owner_public_key:
          type: string
          description: OpenBox-managed SSH access rewritten onto the derived instance.
    RestoreSnapshotRequest:
      type: object
      required: [name, owner_public_key]
      additionalProperties: false
      properties:
        name: { type: string }
        owner_public_key:
          type: string
          description: OpenBox-managed SSH access rewritten onto the derived instance.
    DeriveInstanceResult:
      type: object
      required: [operation, storage_efficiency]
      properties:
        instance:
          allOf: [{ $ref: "#/components/schemas/Instance" }]
          nullable: true
        operation: { $ref: "#/components/schemas/Operation" }
        warnings:
          type: array
          items: { type: string }
          description: Preflight warnings (full copy, retained guest secrets).
        storage_efficiency:
          type: string
          enum: [confirmed, not_supported, unknown]
          description: >
            Copy-on-write claim is allowed only when confirmed. Otherwise OpenBox
            must not imply storage-efficient copy behavior.
    InstanceSoftware:
      type: object
      required: [package_id, status, updated_at]
      properties:
        package_id: { type: string }
        status: { type: string, enum: [absent, pending, installed, failed] }
        version: { type: string }
        error: { type: string }
        updated_at: { type: string, format: date-time }
    SoftwarePackage:
      type: object
      required: [id, name, description]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
    ListSoftwareResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/SoftwarePackage" }
    Operation:
      type: object
      required: [id, type, target_type, target_id, status, stage, progress, attempts, created_at, updated_at]
      properties:
        id: { type: string }
        type: { type: string }
        target_type: { type: string }
        target_id: { type: string }
        status: { type: string, enum: [pending, running, succeeded, failed] }
        stage: { type: string }
        progress: { type: integer, minimum: 0, maximum: 100 }
        error_code: { type: string }
        error_class: { type: string }
        attempts: { type: integer, minimum: 0 }
        next_attempt_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    BuildImageRequest:
      type: object
      additionalProperties: false
      properties:
        architecture: { type: string, enum: [x86_64, aarch64] }
        runtime: { type: string, enum: [container, virtual_machine] }
    PiProfile:
      type: object
      required: [id, name, version, settings_json, updated_at]
      properties:
        id: { type: string }
        name: { type: string }
        version: { type: integer, minimum: 1 }
        settings_json: { type: string }
        updated_at: { type: string, format: date-time }
    PiProfileVersion:
      type: object
      required: [version, settings_json, created_at]
      properties:
        version: { type: integer, minimum: 1 }
        settings_json: { type: string }
        created_at: { type: string, format: date-time }
    OperationEvent:
      type: object
      required: [sequence, operation_id, stage, status, progress, created_at]
      properties:
        sequence: { type: integer, minimum: 1 }
        operation_id: { type: string }
        stage: { type: string }
        status: { type: string, enum: [pending, running, succeeded, failed] }
        progress: { type: integer, minimum: 0, maximum: 100 }
        error_class: { type: string }
        error_code: { type: string }
        message: { type: string }
        metadata: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    CreateInstanceRequest:
      type: object
      required: [name, image, owner_public_key]
      additionalProperties: false
      properties:
        name: { type: string }
        kind: { type: string, enum: [sandbox, vps], default: vps }
        image: { type: string }
        requested_isolation: { type: string, enum: [strong, container], description: "Omit to let the server choose strong when KVM is usable, otherwise container. Explicit strong fails with capability_unavailable when VMs are not usable." }
        resources: { $ref: "#/components/schemas/Resources" }
        owner_public_key: { type: string }
        lifetime_seconds:
          type: integer
          minimum: 1
          maximum: 86400
          description: >
            Sandbox TTL from create time. Defaults to 3600 (1h) for sandboxes.
            Valid only for sandbox kinds. Must not exceed 86400 (24h).
        egress_profile_id:
          type: string
          description: Optional system egress profile. Defaults by kind when omitted.
        packages:
          type: array
          items: { type: string }
          description: Catalog package IDs to install after the instance is ready.
    ExecInstanceRequest:
      type: object
      required: [argv]
      additionalProperties: false
      properties:
        argv:
          type: array
          minItems: 1
          items: { type: string, minLength: 1 }
          description: Argv tokens only; whitespace inside a token is rejected. No shell string.
        working_dir: { type: string, description: Absolute guest working directory. }
        env:
          type: object
          additionalProperties: { type: string }
          description: Filtered to an allowlist (PATH, HOME, USER, LOGNAME, LANG, LC_*, TERM, TMP*).
        timeout_seconds: { type: integer, minimum: 1, maximum: 1800, description: "Defaults to 300 (5m); maximum 1800 (30m)." }
        stdin_base64: { type: string, description: Optional base64-encoded stdin payload. }
    ExtendInstanceRequest:
      type: object
      required: [duration_seconds]
      additionalProperties: false
      properties:
        duration_seconds: { type: integer, minimum: 1, description: Seconds to add to expires_at. }
    CreateInstanceResult:
      type: object
      required: [operation]
      properties:
        instance:
          allOf: [{ $ref: "#/components/schemas/Instance" }]
          nullable: true
        operation: { $ref: "#/components/schemas/Operation" }
    ListImagesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Image" }
    ListInstancesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Instance" }
    ListOperationsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Operation" }
    Route:
      type: object
      required: [id, instance_id, hostname, target_port, visibility, tls_state, created_at, updated_at]
      properties:
        id: { type: string }
        instance_id: { type: string }
        hostname: { type: string }
        target_port: { type: integer, minimum: 1, maximum: 65535 }
        visibility: { type: string, enum: [private, public] }
        tls_state: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateRouteRequest:
      type: object
      additionalProperties: false
      required: [instance_id, hostname, target_port]
      properties:
        instance_id: { type: string, minLength: 1 }
        hostname: { type: string, minLength: 1, maxLength: 253 }
        target_port: { type: integer, minimum: 1, maximum: 65535 }
    UpdateRouteRequest:
      type: object
      additionalProperties: false
      properties:
        hostname: { type: string, minLength: 1, maxLength: 253 }
        target_port: { type: integer, minimum: 1, maximum: 65535 }
    ListRoutesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Route" }
    SuggestedPortsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { type: integer, minimum: 1, maximum: 65535 }
      description: >
        Candidate ports for route creation. Empty when the runtime cannot list
        listening ports yet. Never creates or publishes routes.
    ErrorEnvelope:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message, retryable, request_id]
          additionalProperties: false
          properties:
            code: { type: string }
            message: { type: string }
            field: { type: string }
            retryable: { type: boolean }
            request_id: { type: string }

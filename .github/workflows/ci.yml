# SPDX-License-Identifier: AGPL-3.0-only

name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  PNPM_VERSION: 10.13.1

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: test -z "$(gofmt -l cmd internal pkg)"
      - run: go build ./cmd/openbox ./cmd/openboxd

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @openbox/web lint
      - run: pnpm --filter @openbox/web test
      - run: pnpm --filter @openbox/web build

  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-license-headers.sh

  generated-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/check-generated.sh

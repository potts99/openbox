version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      non-major:
        update-types: [minor, patch]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      non-major:
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      non-major:
        update-types: [minor, patch]
